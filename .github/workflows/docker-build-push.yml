name: Docker Image Build & Bump Chart Tag

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write   # chart/values.yaml image.tag 커밋
  packages: write   # ghcr.io push

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: idoyo7/palworld-admin

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute SHORT_SHA
        run: echo "SHA=${GITHUB_SHA::6}" >> $GITHUB_ENV

      - name: Build and push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.SHA }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  bump-chart-tag:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Compute SHORT_SHA
        run: echo "SHA=${GITHUB_SHA::6}" >> $GITHUB_ENV

      - name: Bump chart image tag
        run: |
          yq eval -i '.image.tag = strenv(SHA)' chart/values.yaml
          echo "=== chart/values.yaml (image) ==="
          grep -A3 '^image:' chart/values.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "ci-bot@users.noreply.github.com"
          if git diff --quiet; then
            echo "No tag change — skipping commit"
            exit 0
          fi
          git add chart/values.yaml
          git commit -m "ci: bump image tag to ${SHA} [skip ci]"
          # GITHUB_TOKEN 로 push (재귀 트리거 안 됨)
          git push
