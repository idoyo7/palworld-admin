# palworld-admin 차트 기본값. 환경별 오버라이드는 mont-helm/stage/palworld-admin/cvalues.yaml.
# image.tag 는 chart/tag.yaml 에서 CI 가 관리 — 아래 tag 는 placeholder(tag.yaml 이 override).

name: palworld-admin
image:
  repository: ghcr.io/idoyo7/palworld-admin
  tag: "latest"
  pullPolicy: IfNotPresent
replicas: 1
# 관리 대상 팰월드 네임스페이스(앱에 env 로 주입). 보통 릴리스 네임스페이스와 동일.
palworldNamespace: palworld
# 팰월드 서버 REST API(admin:<password>) 인증 비밀번호. 접속자 메트릭(/metrics) 수집에 필요.
# secretName 이 비어있으면 비활성 — env 미주입, palworld_up 등 메트릭 미노출(그래도 앱은 정상 동작).
palworldAdminPassword:
  secretName: ""
  secretKey: rconPassword
resources:
  requests:
    cpu: 25m
    memory: 96Mi
  limits:
    cpu: 300m
    memory: 256Mi
service:
  port: 80
# 리소스 사용량 그래프(옵션). Prometheus 호환(query_range) 엔드포인트 URL.
# 비우면 그래프 섹션이 아예 안 뜸. 유효/도달 가능할 때만 렌더.
metrics:
  prometheusUrl: ""
  # VMServiceScrape 생성 여부 — 활성화 시 이 앱의 /metrics 엔드포인트를 VictoriaMetrics 가 스크레이프.
  serviceScrape:
    enabled: false
    interval: "30s"
# 최소 RBAC (Role + RoleBinding + SA). 대상 네임스페이스 = 릴리스 네임스페이스.
rbac:
  create: true
# Istio VirtualService. 인증(oauth2-proxy) 붙기 전에는 enabled:false 로 두어 공개 노출 방지.
virtualService:
  enabled: false
  host: palworld.makgol.com
  gateway: istio-system/makgol-gateway
  # upstreamHost 가 비면 앱 서비스로 직결(인증 없음), 값이 있으면 그 호스트(oauth2-proxy)로 라우팅.
  upstreamHost: ""
  timeout: 60s
  retries:
    attempts: 3
    perTryTimeout: 20s
