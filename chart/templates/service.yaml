apiVersion: v1
kind: Service
metadata:
  name: {{ include "palworld-admin.name" . }}-service
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "palworld-admin.labels" . | nindent 4 }}
spec:
  selector:
    app: {{ include "palworld-admin.name" . }}
  ports:
    - protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: 3000
